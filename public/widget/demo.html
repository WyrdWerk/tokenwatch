<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokenWatch Widget Demo</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; }
    h1 { margin-bottom: 1rem; }
    .widgets { display: flex; gap: 1rem; flex-wrap: wrap; }
    .widgets > div { background: white; padding: 1rem; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>TokenWatch Widget Demo</h1>
  <p>Embed a live pricing card for any LLM model:</p>
  <div class="widgets">
    <div data-tw-model="glm-5.2" data-tw-tokens="1000" data-tw-mix="2.5,97,0.5"></div>
    <div data-tw-model="deepseek-v3.2" data-tw-tokens="500" data-tw-mix="30,50,20"></div>
    <div data-tw-model="claude-sonnet-5" data-tw-tokens="100" data-tw-mix="70,0,30" data-tw-theme="dark"></div>
  </div>
  <script src="embed.js"></script>
</body>
</html>

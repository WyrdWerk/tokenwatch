name: Refresh Pricing

concurrency:
  group: repo-refresh
  cancel-in-progress: false

on:
  schedule:
    # daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: {} # manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: node --test test/*.test.mjs

  refresh:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: node --test test/*.test.mjs

      - name: Fetch & normalize text pricing
        run: node scripts/fetch-pricing.mjs

      - name: Prefetch fal.ai catalog (shared by image + video pipelines)
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: node scripts/fetch-fal.mjs

      - name: Fetch & normalize image pricing
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          FAL_CACHE_ONLY: '1'
        run: node scripts/fetch-images.mjs

      - name: Fetch & normalize video pricing
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          FAL_CACHE_ONLY: '1'
        run: node scripts/fetch-videos.mjs

      - name: Commit pricing data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pricing.json public/image-pricing.json public/video-pricing.json
          if git diff --cached --quiet; then
            echo "No pricing changes — skipping commit."
          else
            git commit -m "chore: refresh pricing data ($(date -u +%Y-%m-%dT%H:%M) UTC)"
            git push
          fi

      - name: Bust cache (content-hash ?v= tokens)
        run: node scripts/bust-cache.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name payg-inference-calculator --branch main

  deploy:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bust cache (content-hash ?v= tokens)
        run: node scripts/bust-cache.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name payg-inference-calculator --branch main
